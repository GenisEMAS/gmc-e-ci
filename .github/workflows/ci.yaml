name: ci

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/gmc-e-ci

jobs:
  main:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python_version: "3.10"
            codename: jammy
            odoo_version: "17.0"
            odoo_org_repo: "EMAS-Solutions/odoo"
            odoo_enterprise_repo: "EMAS-Solutions/enterprise"
            image_name: py3.10-odoo17.0

    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: odoo
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            codename=${{ matrix.codename }}
            python_version=${{ matrix.python_version }}
            odoo_version=${{ matrix.odoo_version }}
            odoo_org_repo=${{ matrix.odoo_org_repo }}
            odoo_enterprise_repo=${{ matrix.odoo_enterprise_repo }}
          secrets: |
            github_pat=${{ secrets.PAT }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:latest
          cache-to: type=local,dest=/tmp/.buildx-cache
          load: true

      - name: Run tests
        run: |
          docker run --rm -v "${PWD}/tests:/mnt/tests" --network=host -e PGHOST=localhost \
            "${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:latest" \
            /mnt/tests/runtests.sh -v

      - name: Push Docker image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            codename=${{ matrix.codename }}
            python_version=${{ matrix.python_version }}
            odoo_version=${{ matrix.odoo_version }}
            odoo_org_repo=${{ matrix.odoo_org_repo }}
            odoo_enterprise_repo=${{ matrix.odoo_enterprise_repo }}
          secrets: |
            github_pat=${{ secrets.PAT }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=inline
          push: true
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
