name: ci

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  main:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python_version: "3.10"
            codename: jammy
            chrome_milestone: "139"
            odoo_version: "17.0"
            odoo_org_repo: "EMAS-Solutions/odoo"
            odoo_enterprise_repo: "EMAS-Solutions/enterprise"
            image_name: py3.10-odoo17.0

    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: odoo
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Clone Odoo community
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.odoo_org_repo }}
          ref: ${{ matrix.odoo_version }}
          token: ${{ secrets.PAT }}
          path: ci-deps/odoo

      - name: Clone Odoo enterprise
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.odoo_enterprise_repo }}
          ref: ${{ matrix.odoo_version }}
          token: ${{ secrets.PAT }}
          path: ci-deps/enterprise

      - name: Prepare container image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"
          echo "prefix=ghcr.io/${owner}/gmc-e-ci" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ steps.image.outputs.owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            codename=${{ matrix.codename }}
            chrome_milestone=${{ matrix.chrome_milestone }}
            python_version=${{ matrix.python_version }}
            odoo_version=${{ matrix.odoo_version }}
          secrets: |
            github_pat=${{ secrets.PAT }}
          tags: |
            ${{ steps.image.outputs.prefix }}/${{ matrix.image_name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
          cache-from: type=registry,ref=${{ steps.image.outputs.prefix }}/${{ matrix.image_name }}:latest
          cache-to: type=local,dest=/tmp/.buildx-cache
          load: true

      - name: Verify dependencies in image
        run: |
          docker run --rm \
            "${{ steps.image.outputs.prefix }}/${{ matrix.image_name }}:latest" \
            python -c "import gevent, greenlet, lxml, psycopg2; import odoo; import odoo.cli; print('deps OK')"

      - name: Wait for PostgreSQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq postgresql-client
          for i in $(seq 1 30); do
            if PGPASSWORD=odoo pg_isready -h localhost -U odoo -d odoo; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Run tests
        run: |
          docker run --rm \
            -v "${PWD}/tests:/mnt/tests" \
            --network=host \
            -e PGHOST=localhost \
            -e PGUSER=odoo \
            -e PGPASSWORD=odoo \
            -e PGDATABASE=odoo \
            "${{ steps.image.outputs.prefix }}/${{ matrix.image_name }}:latest" \
            /mnt/tests/runtests.sh -v

      - name: Push Docker image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            codename=${{ matrix.codename }}
            chrome_milestone=${{ matrix.chrome_milestone }}
            python_version=${{ matrix.python_version }}
            odoo_version=${{ matrix.odoo_version }}
          secrets: |
            github_pat=${{ secrets.PAT }}
          tags: |
            ${{ steps.image.outputs.prefix }}/${{ matrix.image_name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=inline
          push: true
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
